<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1a2b48',
                        gold: '#d4af37',
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center bg-cover bg-center"
    style="background-image: url('https://images.unsplash.com/photo-1615484477778-ca3b77942c2c?auto=format&fit=crop&q=80&w=1920');"
    x-data="authForm">

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-navy/60 backdrop-blur-sm z-0"></div>

    <div class="glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl relative z-10 border border-white/20 mx-4">

        <!-- Header -->
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-navy mx-auto rounded-full flex items-center justify-center mb-4 shadow-lg border-2 border-gold/30">
                <span class="text-gold font-bold text-3xl font-serif">B</span>
            </div>
            <h2 class="text-2xl font-black text-navy tracking-tight">Welcome to Luxury</h2>
            <p class="text-sm text-gray-500 mt-2 font-medium">Sign in to complete your checkout journey</p>
        </div>

        <!-- Social Buttons -->
        <div class="space-y-3 mb-6">
            <button onclick="handleGoogleLogin()"
                class="w-full bg-white border border-gray-200 text-gray-700 font-bold py-3 px-4 rounded-xl shadow-sm hover:bg-gray-50 hover:shadow transition flex items-center justify-center relative">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 absolute left-4"
                    alt="Google">
                Continue with Google
            </button>

            <button onclick="handleFacebookLogin()"
                class="w-full bg-[#1877F2] border border-[#1877F2] text-white font-bold py-3 px-4 rounded-xl shadow-sm hover:bg-[#166FE5] hover:shadow transition flex items-center justify-center relative">
                <img src="https://www.svgrepo.com/show/475647/facebook-color.svg"
                    class="w-5 h-5 absolute left-4 brightness-0 invert" alt="Facebook">
                Continue with Facebook
            </button>
        </div>

        <!-- Divider -->
        <div class="flex items-center space-x-4 mb-6">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Or</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Error Message -->
        <div x-show="errorMessage" x-collapse>
            <div
                class="bg-red-50 text-red-500 text-sm font-semibold p-3 rounded-lg border border-red-100 mb-4 flex items-center">
                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd"></path>
                </svg>
                <span x-text="errorMessage"></span>
            </div>
        </div>

        <!-- Form Fields -->
        <form @submit.prevent="handleEmailLogin()" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" x-model="email" placeholder="client@example.com"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-navy focus:bg-white transition text-sm text-navy font-medium placeholder-gray-400">
            </div>
            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Password</label>
                    <a href="#" class="text-xs font-bold text-gold hover:text-navy transition">Forgot?</a>
                </div>
                <input type="password" x-model="password" placeholder="••••••••"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-navy focus:bg-white transition text-sm text-navy font-bold tracking-widest placeholder-gray-400">
            </div>

            <button type="submit"
                class="w-full bg-navy text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:bg-gold hover:shadow-gold/30 transition-all duration-300 flex items-center justify-center mt-6">
                <span x-show="!isLoading">Verify & Create Account</span>
                <div x-show="isLoading"
                    class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" x-cloak></div>
            </button>
        </form>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import {
            getAuth,
            signInWithPopup,
            GoogleAuthProvider,
            FacebookAuthProvider
        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // TODO: Replace with your app's Firebase project configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project-id.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project-id.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Providers
        const googleProvider = new GoogleAuthProvider();
        const facebookProvider = new FacebookAuthProvider();

        // Expose functions to global scope for the inline onclick handlers
        window.handleGoogleLogin = () => {
            console.log("Triggering Google OAuth...");
            signInWithPopup(auth, googleProvider)
                .then((result) => {
                    const user = result.user;
                    console.log("User Verified:", user);
                    alert(`Welcome ${user.displayName}! Let's proceed to checkout.`);
                    // Yahan se user ko dashboard par redirect karein
                    // window.location.href = '/dashboard.html';
                }).catch((error) => {
                    console.error("Error:", error.message);
                    window.dispatchEvent(new CustomEvent('auth-error', { detail: 'Google Login failed: ' + error.message }));
                });
        };

        window.handleFacebookLogin = async () => {
            console.log("Triggering Facebook OAuth...");
            try {
                const result = await signInWithPopup(auth, facebookProvider);
                const user = result.user;
                console.log("Facebook Login Success:", user.displayName, user.email);
                alert(`Welcome ${user.displayName}! Let's proceed to checkout.`);
                // Redirect logic here: window.location.href = '/checkout.html';
            } catch (error) {
                console.error("Facebook Login Error:", error.code, error.message);
                window.dispatchEvent(new CustomEvent('auth-error', { detail: 'Facebook Login failed. ' + error.message }));
            }
        };
    </script>

    <!-- UI Logic -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('authForm', () => ({
                email: '',
                password: '',
                errorMessage: '',
                isLoading: false,

                init() {
                    // Listen for errors from the Firebase module
                    window.addEventListener('auth-error', (e) => {
                        this.errorMessage = e.detail;
                    });
                },

                handleEmailLogin() {
                    this.errorMessage = '';

                    // Validation
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!this.email) {
                        this.errorMessage = 'Email address is required.';
                        return;
                    }
                    if (!emailRegex.test(this.email)) {
                        this.errorMessage = 'Please enter a valid email address.';
                        return;
                    }
                    if (!this.password || this.password.length < 6) {
                        this.errorMessage = 'Password must be at least 6 characters.';
                        return;
                    }

                    // Simulate API Call for Email/Password
                    this.isLoading = true;
                    setTimeout(() => {
                        this.isLoading = false;
                        alert('Account Verified! Proceeding to checkout...');
                        // Implement createUserWithEmailAndPassword or signInWithEmailAndPassword here
                    }, 1500);
                }
            }));
        });
    </script>
</body>

</html>
