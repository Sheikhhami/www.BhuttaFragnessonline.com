<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to Cart | Bhutta Fragrance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        .lux-gradient { background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%); }
        .gold-border { border-color: #d4af37; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 bg-gray-50/50" x-data="cartApp()">

    <!-- Header Section -->
    <header class="lux-gradient text-white py-16 px-4 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <div class="absolute top-10 left-10 w-64 h-64 bg-white rounded-full blur-3xl"></div>
            <div class="absolute bottom-10 right-10 w-64 h-64 bg-gold-bg rounded-full blur-3xl"></div>
        </div>
        <div class="container mx-auto relative z-10">
            <a href="index.html" class="inline-flex items-center text-xs font-black uppercase tracking-widest text-[#a8dadc] mb-6 hover:text-white transition group">
                <svg class="w-4 h-4 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                Continue Selection
            </a>
            <h1 class="text-6xl font-black uppercase tracking-tighter leading-none mb-2">ADD TO CARD</h1>
            <p class="text-[#a8dadc] text-sm font-bold uppercase tracking-[0.2em]">Premium Scent Personal Collection</p>
        </div>
    </header>

    <main class="container mx-auto max-w-4xl py-12 px-4">
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Left Side: Items List -->
            <div class="flex-1 space-y-6">
                <div x-show="cartItems.length === 0" class="bg-white p-20 rounded-[2.5rem] shadow-xl text-center border-2 border-dashed border-gray-100" x-cloak>
                    <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6 border border-gray-100">
                        <svg class="w-12 h-12 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 11-8 0m-4 8h16l-1 9H5l-1-9z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                    <h2 class="text-2xl font-black text-gray-800 mb-2 uppercase">Your Bag is Empty</h2>
                    <p class="text-gray-400 font-bold italic mb-8">Discover your next signature scent.</p>
                    <a href="index.html" class="bg-primary text-white px-8 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-gold-bg transition-all shadow-lg inline-block">Start Shopping</a>
                </div>

                <template x-for="item in cartItems" :key="item.id">
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-6 hover:shadow-xl transition-all group active:scale-[0.98]">
                        <div class="w-32 h-32 shrink-0 rounded-2xl overflow-hidden bg-gray-50 border border-gray-100 shadow-inner">
                            <img :src="item.image" :alt="item.name" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-black text-gray-800 text-xl leading-tight" x-text="item.name"></h3>
                                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Premium Collection</p>
                                </div>
                                <button @click="removeItem(item.id)" class="text-red-300 hover:text-red-600 transition-colors p-3 hover:bg-red-50 rounded-2xl group/trash">
                                    <svg class="w-6 h-6 group-hover/trash:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                </button>
                            </div>
                            
                            <div class="flex items-center justify-between mt-6">
                                <div class="flex items-center bg-gray-50 rounded-full p-1.5 border border-gray-100 shadow-inner">
                                    <button @click="updateQty(item.id, -1)" class="w-10 h-10 rounded-full flex items-center justify-center font-bold hover:bg-white hover:text-gold-text transition-all text-gray-400 bg-gray-100/50 shadow-sm">-</button>
                                    <span class="px-6 font-black text-gray-800 text-lg" x-text="item.qty"></span>
                                    <button @click="updateQty(item.id, 1)" class="w-10 h-10 rounded-full flex items-center justify-center font-bold hover:bg-white hover:text-gold-text transition-all text-gray-400 bg-gray-100/50 shadow-sm">+</button>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] font-black text-gray-300 uppercase block leading-none mb-1">Subtotal</span>
                                    <span class="text-xl font-black text-gold-text" x-text="'PKR ' + (item.price * item.qty).toLocaleString()"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Right Side: Order Summary -->
            <div class="w-full lg:w-96 shrink-0" x-show="cartItems.length > 0" x-cloak>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100 sticky top-8">
                    <h2 class="text-xl font-black text-gray-800 uppercase tracking-tight mb-8">Summary</h2>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between items-center text-sm font-bold text-gray-500 uppercase tracking-widest">
                            <span>Selections</span>
                            <span class="text-gray-800" x-text="cartItems.length"></span>
                        </div>
                        <div class="flex justify-between items-center text-sm font-bold text-gray-500 uppercase tracking-widest">
                            <span>Total Items</span>
                            <span class="text-gray-800" x-text="getTotalQty()"></span>
                        </div>
                        <div class="pt-6 border-t border-gray-100 flex justify-between items-center">
                            <span class="text-sm font-black text-gray-400 uppercase tracking-[0.2em]">Grand Total</span>
                            <span class="text-3xl font-black text-gold-text" x-text="'PKR ' + getGrandTotal().toLocaleString()"></span>
                        </div>
                    </div>

                    <button @click="proceedToCheckout()" 
                            class="group w-full bg-slate-900 hover:bg-gold-bg text-white text-base font-black py-5 rounded-2xl transition-all duration-500 shadow-xl flex items-center justify-center gap-3 uppercase tracking-widest active:scale-95">
                        <span>PROCEED TO CHECKOUT</span>
                        <svg class="w-6 h-6 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                    
                    <div class="mt-8 flex items-center justify-center gap-2 opacity-30 grayscale saturate-0">
                        <div class="w-8 h-8 bg-gray-200 rounded-lg"></div>
                        <div class="w-8 h-8 bg-gray-200 rounded-lg"></div>
                        <div class="w-8 h-8 bg-gray-200 rounded-lg"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="py-12 border-t border-gray-100">
        <div class="container mx-auto px-4 text-center">
            <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.3em]">Bhutta Fragrance • Premium Logistics Guaranteed</p>
        </div>
    </footer>

    <script>
        function cartApp() {
            return {
                cartItems: [],

                init() {
                    const saved = localStorage.getItem('bhutta_fragness_cart');
                    if (saved) {
                        this.cartItems = JSON.parse(saved);
                    }
                    
                    // Sync with index.html in case tab is open separately
                    window.addEventListener('storage', (e) => {
                        if (e.key === 'bhutta_fragness_cart') {
                            this.cartItems = JSON.parse(e.newValue);
                        }
                    });
                },

                updateQty(id, delta) {
                    const item = this.cartItems.find(i => i.id === id);
                    if (item) {
                        item.qty = Math.max(1, item.qty + delta);
                        this.saveCart();
                    }
                },

                removeItem(id) {
                    if (confirm('Are you sure you want to remove this scent from your bag?')) {
                        this.cartItems = this.cartItems.filter(i => i.id !== id);
                        this.saveCart();
                    }
                },

                saveCart() {
                    localStorage.setItem('bhutta_fragness_cart', JSON.stringify(this.cartItems));
                },

                getGrandTotal() {
                    return this.cartItems.reduce((acc, i) => acc + (i.price * i.qty), 0);
                },

                getTotalQty() {
                    return this.cartItems.reduce((acc, i) => acc + i.qty, 0);
                },

                proceedToCheckout() {
                    if (this.cartItems.length === 0) return;
                    
                    // Copy to ship_now_queue for checkout.html
                    localStorage.setItem('ship_now_queue', JSON.stringify(this.cartItems));
                    
                    // Redirect
                    window.location.href = 'checkout.html';
                }
            }
        }
    </script>
</body>
</html>
